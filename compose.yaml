name: chili-dashboard

services:
  backend:
    build:
      context: ./backend
    env_file: .env
    environment:
      DATABASE_URL: sqlite:////data/chili.db
    volumes:
      - ./data:/data
    devices:
      - /dev/snd:/dev/snd
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_started
    ports:
      # Keep v1 local to the Pi. Phone access is added only with authentication.
      - "127.0.0.1:8080:80"
    restart: unless-stopped

  voice:
    build:
      context: ./voice
    env_file: .env
    environment:
      BACKEND_URL: http://backend:8000
      AUDIO_DEVICE: plughw:2,0
      VOICE_WAKEWORD_MODEL: ${VOICE_WAKEWORD_MODEL:-/models/hey_chili.tflite}
      VOICE_WAKEWORD_LABEL: ${VOICE_WAKEWORD_LABEL:-Hey Chili}
    volumes:
      - ./assets/voice/hey_chili.tflite:/models/hey_chili.tflite:ro
    devices:
      - /dev/snd:/dev/snd
    depends_on:
      backend:
        condition: service_started
    profiles: [voice]
    restart: unless-stopped
