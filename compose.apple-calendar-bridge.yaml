services:
  # Deliberately exposes only the authenticated calendar sync endpoint to the LAN.
  # The dashboard UI and its command API remain bound to 127.0.0.1:8080.
  calendar-bridge:
    image: nginx:1.27-alpine
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${CALENDAR_BRIDGE_BIND_ADDRESS:-127.0.0.1}:8081:80"
    volumes:
      - ./deploy/calendar-bridge.nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
