# Raspberry Pi production override. Keep this separate so the UI can also run
# on development machines that do not expose an I2C device.
services:
  backend:
    devices:
      - /dev/i2c-1:/dev/i2c-1
    environment:
      PULSE_SERVER: unix:/run/pulse/native
      WAYLAND_DISPLAY: wayland-0
      XDG_RUNTIME_DIR: /run/user/1000
      DISPLAY_HDMI_OUTPUT: ${DISPLAY_HDMI_OUTPUT:-HDMI-A-2}
    volumes:
      - /run/user/1000/pulse:/run/pulse:ro
      - /run/user/1000:/run/user/1000
      - ./deploy/display-power.sh:/deploy/display-power.sh:ro
      - /usr/bin/wlr-randr:/usr/bin/wlr-randr:ro
      - /lib/aarch64-linux-gnu/libwayland-client.so.0:/lib/aarch64-linux-gnu/libwayland-client.so.0:ro
      - /lib/aarch64-linux-gnu/libffi.so.8:/lib/aarch64-linux-gnu/libffi.so.8:ro

  walkingpad-collector:
    network_mode: host
    volumes:
      - /var/run/dbus:/var/run/dbus
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
