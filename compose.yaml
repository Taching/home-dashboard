name: chili-dashboard

services:
  backend:
    build:
      context: ./backend
    env_file: .env
    environment:
      DATABASE_URL: sqlite:////data/chili.db
    volumes:
      - ./data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_started
    ports:
      # Keep v1 local to the Pi. Phone access is added only with authentication.
      - "127.0.0.1:8080:80"
    restart: unless-stopped

  # Phase 2: enables the microphone and host audio device deliberately.
