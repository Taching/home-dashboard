# Raspberry Pi production override. Keep this separate so the UI can also run
# on development machines that do not expose an I2C device.
services:
  backend:
    devices:
      - /dev/i2c-1:/dev/i2c-1
    environment:
      PULSE_SERVER: unix:/run/pulse/native
    volumes:
      - /run/user/1000/pulse:/run/pulse:ro
