server {
  listen 80;
  server_tokens off;

  location = /api/v1/calendar/apple/sync {
    limit_except POST { deny all; }
    proxy_pass http://backend:8000;
    proxy_set_header Content-Type $content_type;
    proxy_set_header X-Chili-Bridge-Token $http_x_chili_bridge_token;
  }

  location / { return 404; }
}
